# Installed by rootmote-agent installer at /etc/tmpfiles.d/rootmote-agent-sudo.conf.
#
# rootmote-agent.service runs under ProtectSystem=strict, which mounts the
# entire filesystem read-only inside the unit's mount namespace except for
# ReadWritePaths=. sudo needs to create/open its own timestamp ("ticket")
# directory here on every invocation — even with a NOPASSWD sudoers rule —
# and treats a failure to do so as a hard error ("sudo: a password is
# required"), not something NOPASSWD can route around.
#
# /run is tmpfs and rebuilt empty on every boot, and rootmote-agent.service
# typically starts (at multi-user.target, via systemd) long before any
# interactive sudo session would have lazily created this directory itself.
# Rather than race boot order inside the unit's own (also sandboxed)
# ExecStartPre, systemd-tmpfiles guarantees it exists — with the same
# ownership/mode sudo itself would create — before the unit ever starts, so
# ReadWritePaths=/run/sudo in rootmote-agent.service is always satisfied.
d /run/sudo 0711 root root -
